name: Phase 1 Remote Production Audit E2E

on:
  workflow_dispatch:

jobs:
  remote-production-audit-e2e:
    name: Remote production audit E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.REMOTE_AUDIT_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.REMOTE_AUDIT_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.REMOTE_AUDIT_SUPABASE_SERVICE_ROLE_KEY }}
      REMOTE_AUDIT_OUTPUT_ROOT: output/remote-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check remote audit script syntax
        run: node --check docs/operations/phase-1-remote-production-audit-e2e-2026-05-04.mjs

      - name: Check remote audit environment
        run: scripts/check-phase1-remote-audit-env.sh

      - name: Run remote production audit E2E
        run: scripts/run-phase1-remote-audit-e2e.sh

      - name: Upload remote audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase1-remote-production-audit-e2e
          path: output/remote-audit/**
          if-no-files-found: ignore
